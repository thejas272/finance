version: '3.9'

services:
  web:
    image: thejas2722/finance-web:latest
    container_name: drf_finance_bknd
    command: gunicorn finance.wsgi:application --bind 0.0.0.0:8000
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env

  db:
    image: postgres:15
    container_name: drf_finance_bknd_db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: ${FINANCE_DB_NAME}
      POSTGRES_USER: ${FINANCE_DB_USER}
      POSTGRES_PASSWORD: ${FINANCE_DB_PASSWORD}
      FINANCE_DB_HOST: ${FINANCE_DB_HOST}
      FINANCE_DB_PORT: ${FINANCE_DB_PORT}

volumes:
  postgres_data: